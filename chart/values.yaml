# values.yaml (valeurs par defaut)
replicaCount: 2
image:
  repository: europe-west1-docker.pkg.dev/MON_PROJET/shopflow/backend
  tag: ""                 # surcharge par environnement (defaut = appVersion)
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 80
  targetPort: 8000
ingress:
  enabled: true
  className: nginx
  host: shopflow.example.com
config:
  LOG_LEVEL: info          # -> ConfigMap
secret:
  DB_PASSWORD: ""          # -> Secret (injecte via CI/ESO, vide par defaut)
resources:
  requests: { cpu: 100m, memory: 128Mi }
  limits:   { cpu: 500m, memory: 256Mi }
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
