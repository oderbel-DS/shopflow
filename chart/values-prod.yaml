# values-prod.yaml (surcharge uniquement ce qui change)
replicaCount: 4
ingress: { host: shopflow.mondomaine.com }
config: { LOG_LEVEL: warning }
resources:
  requests: { cpu: 250m, memory: 256Mi }
  limits: { cpu: "1", memory: 512Mi }
autoscaling:
  { minReplicas: 4, maxReplicas: 20, targetCPUUtilizationPercentage: 65 }
