# quota-production.yaml
apiVersion: v1
kind: ResourceQuota
metadata: { name: prod-quota, namespace: shopflow-prod }
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    pods: "30"
---
apiVersion: v1
kind: LimitRange
metadata: { name: prod-defaults, namespace: shopflow-prod }
spec:
  limits:
    - type: Container
      default: { cpu: 250m, memory: 256Mi } # limits par defaut
      defaultRequest: { cpu: 100m, memory: 128Mi } # requests par defaut
