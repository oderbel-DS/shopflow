# namespaces.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: shopflow-dev
  labels: { env: dev, team: shopflow }
---
apiVersion: v1
kind: Namespace
metadata:
  name: shopflow-staging
  labels: { env: staging, team: shopflow }
---
apiVersion: v1
kind: Namespace
metadata:
  name: shopflow-prod
  labels: { env: prod, team: shopflow }
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels: { team: platform, purpose: monitoring }
---
apiVersion: v1
kind: Namespace
metadata:
  name: argocd
  labels: { team: platform, purpose: gitops }
